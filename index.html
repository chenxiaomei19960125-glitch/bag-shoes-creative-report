<style>

.tab span{display:block;color:#9eb2ca;font-size:12px;margin-top:6px}
.tab.active span{color:#dbeefa}

.tabpanel{display:none}.tabpanel.active{display:block;animation:fade .25s ease}

.section{margin-top:24px}

.section-title{display:flex;justify-content:space-between;align-items:end;margin:0 0 14px;flex-wrap:wrap;gap:10px}
.section-title h2{font-size:22px;margin:0}
.section-title p{color:var(--muted);margin:0;font-size:13px}

.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:20px;padding:22px}
.kpi{text-align:center}
.kpi b{display:block;font-size:30px;color:var(--accent);font-weight:700}
.kpi span{display:block;color:var(--muted);font-size:12px;margin-top:6px;letter-spacing:.5px}
.kpi-note{margin-top:10px;color:#8aa2bd;font-size:12px}

/* SOP 表格 */
.sop-table{width:100%;border-collapse:separate;border-spacing:0;background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:18px;overflow:hidden}
.sop-table th{background:#16273e;color:#e7f0fb;font-weight:600;font-size:13px;text-align:left;padding:12px 14px;border-bottom:1px solid var(--line)}
.sop-table td{vertical-align:top;padding:14px;border-bottom:1px solid var(--line);color:#d8e4f4;font-size:13px;line-height:1.7;white-space:pre-line}
.sop-table tr:last-child td{border-bottom:0}
.sop-table .stage{width:120px;color:#fff;font-weight:600}
.sop-table .stage small{display:block;color:var(--accent);font-size:11px;margin-top:4px;font-weight:500}
.sop-table .learning{width:34%;color:#e3eef9}
.sop-table .must{width:30%;color:#cfe9d6}
.sop-table .avoid{width:24%;color:#f4c8c8}

.cat h3{font-size:20px;margin:0 0 6px}
.cat .items{color:#b6c8dd;font-size:13px;margin-bottom:14px}
.pillrow{display:flex;flex-wrap:wrap;gap:7px;margin:13px 0}
.pill{font-size:12px;color:#d8ecff;background:rgba(88,166,255,.12);border:1px solid rgba(88,166,255,.22);padding:5px 8px;border-radius:999px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.metric{background:rgba(255,255,255,.05);border-radius:12px;padding:10px}
.metric b{font-size:18px}
.metric span{display:block;color:var(--muted);font-size:11px;margin-top:4px}
.hook{color:#dceaff;line-height:1.65;font-size:13px;margin:12px 0}
.shots{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}
.shot{font-size:12px;color:#d7e6f8;background:rgba(77,214,199,.08);border:1px solid rgba(77,214,199,.18);border-radius:10px;padding:8px}

.videos{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.video video{width:100%;aspect-ratio:9/16;object-fit:cover;background:#000;border-radius:14px;border:1px solid var(--line);display:block}
.video .placeholder{width:100%;aspect-ratio:9/16;border-radius:14px;border:1px dashed rgba(88,166,255,.35);background:linear-gradient(180deg,rgba(22,40,64,.7),rgba(10,18,31,.7));display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:14px;color:#9bb1cb}

.video .placeholder .ph-text{font-size:13px;color:#cbdaef;margin-bottom:8px}
.video .placeholder .ph-md5{font-size:11px;color:#7e95b1;font-family:Menlo,Consolas,monospace}

.fc-name{font-size:17px;font-weight:600;color:#fff}
.fc-sub{font-size:12px;color:#9eb2ca}
.fc-kpi{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:#9eb2ca}

.fc-narrative{margin:12px 0 14px;color:#d8e4f4;font-size:13px;line-height:1.7}

.fc-body{display:grid;grid-template-columns:200px 1fr;gap:16px;align-items:start}
.fc-video video{width:100%;aspect-ratio:9/16;object-fit:cover;background:#000;border-radius:12px;border:1px solid var(--line);display:block}
.fc-frames{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.fc-frame{position:relative;margin:0;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:#0a121f}
.fc-frame img{width:100%;aspect-ratio:9/16;object-fit:cover;display:block}
.fc-frame .fc-pct{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.6);color:var(--accent);font-size:11px;padding:2px 6px;border-radius:6px;font-weight:600}
.fc-frame figcaption{padding:6px 4px;text-align:center;color:#cbd9eb;font-size:11px;background:rgba(7,17,31,.6)}
.fc-no-frames{grid-column:1/-1;padding:20px;text-align:center;color:#8aa2bd;font-size:12px;background:rgba(255,255,255,.03);border:1px dashed var(--line);border-radius:10px}

  const s = t.summary;
  return `<section class="tabpanel${i===0?' active':''}" id="panel-${t.id}">

    <!-- 一、类目均值（大盘） -->
    <div class="section">
      <div class="section-title"><h2><span class="section-num">一、</span>${t.name} 类目均值</h2><p>说明：下方 Top 类目与 Top15 素材逐条表现可与类目均值对照，快速判断每条素材的相对强弱。</p></div>
      <div class="kpis">
        <div class="kpi"><b>${s.ctr}%</b><span>CTR</span></div>
        <div class="kpi"><b>${s.v3}%</b><span>3s 完播率</span></div>
        <div class="kpi"><b>${s.cvr}%</b><span>浅层 CVR</span></div>
        <div class="kpi"><b>¥${s.price}</b><span>下单单价</span></div>
        <div class="kpi"><b>${s.roi}</b><span>下单 ROI</span></div>
      </div>
    </div>

    <!-- 二、Top 细分类目指标表 -->
    <div class="section">
      <div class="card"><div class="section-title"><h2><span class="section-num">二、</span>Top 细分类目指标表</h2><p>CTR / CVR / ROI / 3秒完播率（按 ROI 排序）</p></div>
        <table class="table"><thead><tr><th>细分类目</th><th>CTR</th><th>CVR</th><th>ROI</th><th>3秒完播</th><th>单价</th></tr></thead>
        <tbody>${t.top_thirds.slice().sort((a,b)=>b.roi-a.roi).map(x=>`<tr><td>${x.name}</td><td>${x.ctr}%</td><td>${x.cvr}%</td><td>${x.roi}</td><td>${x.v3}%</td><td>¥${x.price||'-'}</td></tr>`).join('')}</tbody></table></div>
    </div>

    <!-- 三、黄金五段式 SOP 表（核心方法论） -->
    <div class="section">
      <div class="section-title"><h2><span class="section-num">三、</span>跑量视频黄金五段式 SOP（核心方法论）</h2><p>所有头部素材叙事结构高度收敛为以下 5 段。每段的「核心 Learning + 必做动作 + 避坑项」拆解为可直接复制的 SOP 表格：</p></div>
      <table class="sop-table">
        <thead><tr><th style="width:120px">段位</th><th>核心 Learning</th><th>必做动作（Checklist）</th><th>避坑项</th></tr></thead>
        <tbody>
          ${t.sop_table.map(row=>`<tr>
            <td class="stage">${row.stage}<small>${row.time}</small></td>
            <td class="learning">${row.learning}</td>
            <td class="must">${row.must}</td>
            <td class="avoid">${row.avoid}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <!-- 四、分品类拍摄要点 -->
    <div class="section">
      <div class="section-title"><h2><span class="section-num">四、</span>分品类拍摄要点</h2><p>每个细分品类的代表单品、卖点标签、主话术、4 个必拍镜头</p></div>
      <div class="grid">${t.cards.map(c=>`
        <article class="card cat"><h3>${c.group}</h3><div class="items">${c.items}</div>
          <div class="pillrow">${c.tags.map(x=>`<span class="pill">${x}</span>`).join('')}</div>
          <div class="metrics">
            <div class="metric"><b>${c.ctr}%</b><span>CTR</span></div>
            <div class="metric"><b>${c.v3}%</b><span>3s 完播</span></div>
            <div class="metric"><b>${c.cvr}%</b><span>浅层 CVR</span></div>
            <div class="metric"><b>${c.roi}</b><span>ROI</span></div>
          </div>
          <p class="hook">${c.hook}</p>
          <div class="shots">${c.shots.map(x=>`<div class="shot">${x}</div>`).join('')}</div>
        </article>`).join('')}</div>
    </div>

    <!-- 五、Top 15 跑量素材逐帧剖析 -->
    <div class="section">
      <div class="section-title"><h2><span class="section-num">五、</span>${t.name} Top 跑量素材逐帧剖析（最多 15 条）</h2><p>按消耗规模排序 · 同三级类目优先去重 · 自动抽取 6 个关键帧便于按段位拆解</p></div>
      <div class="frame-cards">${t.top_videos.length === 0
        ? `<div class="empty-tip">⚠️ 当前数据源未下发视频预览 URL，无法展示素材。</div>`
        : t.top_videos.map((v,idx)=>`
        <article class="frame-card">
          <div class="fc-header">
            <div class="fc-title">
              <span class="fc-rank">#${idx+1}</span>
              <span class="fc-name">${v.third}</span>
              <span class="fc-sub">${v.group} · ¥${v.price}</span>
            </div>
            <div class="fc-kpi">
              <span>CTR <b>${v.ctr}%</b></span>
              <span>3s <b>${v.v3}%</b></span>
              <span>CVR <b>${v.cvr}%</b></span>
              <span>ROI <b>${v.roi}</b></span>
            </div>
          </div>
          <div class="fc-narrative"><b>叙事路径：</b>${v.narrative}</div>
          <div class="fc-body">
            <div class="fc-video">
              <video controls muted preload="metadata" src="${v.url}"></video>
            </div>
            <div class="fc-frames">
              ${(v.frames && v.frames.length
                ? v.frames.map(f=>`<figure class="fc-frame"><span class="fc-pct">${f.ratio_pct}%</span><img loading="lazy" src="${f.path}" alt="${f.label}"><figcaption>${f.label} · ${f.ts}s</figcaption></figure>`).join('')
                : '<div class="fc-no-frames">⏳ 关键帧尚未生成，请稍后重新构建</div>')}
            </div>
          </div>
          <div class="fc-learning"><b>Learning：</b>${v.learning.replace(/\n/g,'<br>')}</div>
        </article>`).join('')}</div>
    </div>

  </section>`;
}).join('');

function activate(tab){
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  document.querySelectorAll('.tabpanel').forEach(el=>el.classList.toggle('active',el.id==='panel-'+tab));
  document.querySelectorAll('.tabpanel:not(.active) video').forEach(v=>{try{v.pause();}catch(e){}});
}
document.querySelectorAll('.tab').forEach(el=>el.addEventListener('click',()=>activate(el.dataset.tab)));
</script>
</body></html>
